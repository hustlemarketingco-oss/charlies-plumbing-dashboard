<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Charlie's Plumbing — Tech App</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --red:#C0392B;--red-dark:#96281B;--red-light:#fdf0ee;
  --blue:#1A3A5C;--blue-mid:#2471A3;--blue-light:#e8f4fc;
  --green:#1E8449;--green-light:#eafaf1;
  --amber:#B7770D;--amber-light:#fef9e7;
  --border:#E2E6EA;--off:#F7F8FA;--muted:#7F8C8D;--text:#1C2833;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--off);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;}

/* ── LOGIN SCREEN ── */
.login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:var(--blue);}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:32px;color:white;letter-spacing:3px;margin-bottom:4px;}
.login-logo span{color:var(--red);}
.login-sub{font-size:13px;color:rgba(255,255,255,0.5);letter-spacing:1px;text-transform:uppercase;margin-bottom:40px;}
.login-label{font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:8px;align-self:flex-start;width:100%;font-weight:600;letter-spacing:0.5px;}
.login-select{width:100%;padding:14px 16px;border-radius:12px;border:none;font-size:16px;font-family:'DM Sans',sans-serif;background:rgba(255,255,255,0.12);color:white;margin-bottom:16px;outline:none;appearance:none;cursor:pointer;}
.login-select option{background:var(--blue);color:white;}
.login-btn{width:100%;padding:16px;border-radius:12px;border:none;background:var(--red);color:white;font-size:16px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;letter-spacing:0.5px;margin-top:8px;transition:background 0.15s;}
.login-btn:hover{background:var(--red-dark);}
.login-btn:active{transform:scale(0.98);}

/* ── MAIN APP ── */
.app-screen{display:none;min-height:100vh;flex-direction:column;}
.app-screen.visible{display:flex;}

/* ── HEADER ── */
.header{background:var(--blue);padding:16px 20px 14px;position:sticky;top:0;z-index:50;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
.header-name{font-family:'Bebas Neue',sans-serif;font-size:20px;color:white;letter-spacing:1.5px;}
.header-date{font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:0.5px;}
.header-badge{background:var(--red);color:white;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;font-family:'DM Mono',monospace;}
.logout-btn{background:none;border:none;color:rgba(255,255,255,0.4);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;padding:4px 0;}

/* ── JOBS ── */
.jobs-container{flex:1;padding:16px;}
.section-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:600;margin-bottom:10px;padding-left:2px;}

/* ── JOB CARD ── */
.job-card{background:white;border-radius:16px;border:1px solid var(--border);margin-bottom:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.job-card-header{padding:16px 18px 12px;border-bottom:1px solid var(--border);}
.job-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.job-customer{font-size:17px;font-weight:700;color:var(--text);}
.job-service{font-size:13px;color:var(--muted);margin-top:2px;}
.job-address{font-size:13px;color:var(--blue-mid);margin-top:4px;font-weight:500;}
.job-time-row{display:flex;align-items:center;gap:8px;margin-top:8px;}
.job-time{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;}
.job-notes{font-size:12px;color:var(--muted);font-style:italic;margin-top:6px;padding-top:6px;border-top:1px solid var(--border);}

/* ── STATUS ACTIONS ── */
.job-actions{padding:14px 18px;display:flex;flex-direction:column;gap:10px;}
.action-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:600;margin-bottom:2px;}
.status-flow{display:flex;gap:8px;}
.action-btn{flex:1;padding:13px 8px;border-radius:12px;border:none;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.15s;letter-spacing:0.3px;}
.action-btn:active{transform:scale(0.97);}
.btn-enroute{background:var(--amber-light);color:var(--amber);border:2px solid rgba(183,119,13,0.3);}
.btn-enroute.active{background:var(--amber);color:white;border-color:var(--amber);}
.btn-onsite{background:var(--blue-light);color:var(--blue);border:2px solid rgba(26,58,92,0.15);}
.btn-onsite.active{background:var(--blue);color:white;border-color:var(--blue);}
.btn-complete{background:var(--green-light);color:var(--green);border:2px solid rgba(30,132,73,0.2);}
.btn-complete.active{background:var(--green);color:white;border-color:var(--green);}
.btn-map{width:100%;padding:12px;border-radius:12px;border:1.5px solid var(--border);background:white;color:var(--blue-mid);font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-map:active{background:var(--off);}

/* ── CURRENT STATUS BADGE ── */
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.status-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;}
.sb-scheduled{background:var(--blue-light);color:var(--blue);}
.sb-dispatched,.sb-en_route{background:var(--amber-light);color:var(--amber);}
.sb-on_site{background:var(--blue-light);color:var(--blue-mid);}
.sb-complete{background:var(--green-light);color:var(--green);}

/* ── EMPTY / LOADING ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:var(--blue);margin-bottom:6px;}
.empty-text{font-size:13px;line-height:1.6;}
.loading-state{text-align:center;padding:60px 20px;}
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--blue);color:white;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:100;transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);box-shadow:0 4px 16px rgba(0,0,0,0.2);white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--green);}
.btn-estimate{width:100%;padding:12px;background:white;color:var(--blue);border:1.5px solid var(--blue);border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:10px;font-family:'Barlow',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-estimate:active{background:#e8f4fc;}
.pay-method-btn{padding:14px 8px;border:1.5px solid #E2E6EA;border-radius:10px;background:white;cursor:pointer;font-size:13px;font-weight:700;color:#1C2833;font-family:'Barlow',sans-serif;transition:all 0.15s;width:100%;}
.pay-method-btn:active{border-color:#1A3A5C;}
.pay-method-btn.selected{border-color:#27AE60;background:#EAFAF1;color:#1E8449;}
#payment-sheet{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:150;display:none;align-items:flex-end;justify-content:center;}
#payment-sheet.open{display:flex;}
.payment-inner{background:white;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:24px;max-height:90vh;overflow-y:auto;}
.est-sheet{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.est-sheet.open{display:flex;}
.est-inner{background:white;border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:92vh;display:flex;flex-direction:column;}
.est-sheet-header{padding:16px 20px;border-bottom:1px solid #E2E6EA;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.est-sheet-title{font-size:18px;font-weight:700;color:#1A3A5C;}
.est-sheet-body{flex:1;overflow-y:auto;padding:16px 20px;}
.est-sheet-footer{padding:14px 20px;border-top:1px solid #E2E6EA;display:flex;gap:8px;flex-shrink:0;}
.est-input{width:100%;padding:10px 14px;border:1.5px solid #E2E6EA;border-radius:8px;font-size:14px;font-family:'Barlow',sans-serif;color:#1C2833;outline:none;box-sizing:border-box;background:white;}
.est-input:focus{border-color:#1A3A5C;}
.est-label{font-size:11px;font-weight:700;color:#7F8C8D;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;display:block;}
.est-field{margin-bottom:14px;}
.li-row{display:grid;grid-template-columns:1fr 50px 80px 30px;gap:6px;align-items:center;margin-bottom:8px;}
.li-row input{padding:8px 10px;border:1.5px solid #E2E6EA;border-radius:6px;font-size:13px;font-family:'Barlow',sans-serif;outline:none;width:100%;box-sizing:border-box;}
.li-row input:focus{border-color:#1A3A5C;}
.li-del{width:28px;height:28px;background:#fdf0ee;border:none;border-radius:6px;cursor:pointer;font-size:14px;color:#C0392B;flex-shrink:0;}
.est-totals{background:#F8F9FA;border-radius:8px;padding:12px 14px;margin-top:8px;}
.est-total-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:#555;}
.est-total-row.grand{font-size:17px;font-weight:700;color:#1A3A5C;border-top:1px solid #E2E6EA;margin-top:6px;padding-top:8px;}
.toast.error{background:var(--red);}

/* ── CONFIRM MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:60;display:none;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:white;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:480px;margin:0 auto;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:var(--blue);margin-bottom:6px;}
.modal-text{font-size:14px;color:var(--muted);margin-bottom:24px;line-height:1.5;}
.modal-actions{display:flex;gap:10px;}
.modal-confirm{flex:1;padding:14px;border-radius:12px;border:none;background:var(--green);color:white;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;}
.modal-cancel{flex:1;padding:14px;border-radius:12px;border:1.5px solid var(--border);background:white;color:var(--muted);font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;}
.modal-confirm.red{background:var(--red);}
.modal-confirm.amber{background:var(--amber);}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-logo">Charlie's <span>Plumbing</span></div>
  <div class="login-sub">Tech Portal</div>
  <div class="login-label">Who are you?</div>
  <select class="login-select" id="tech-select">
    <option value="">Select your name...</option>
  </select>
  <button class="login-btn" onclick="login()">Start My Day →</button>
</div>

<!-- MAIN APP -->
<div class="app-screen" id="app-screen">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-name" id="header-name">Loading...</div>
        <div class="header-date" id="header-date"></div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <div class="header-badge" id="jobs-badge">0 jobs</div>
        <button class="logout-btn" onclick="logout()">Switch tech</button>
      </div>
    </div>
  </div>

  <div class="jobs-container" id="jobs-container">
    <div class="loading-state"><div class="spinner"></div><div style="font-size:13px;color:var(--muted)">Loading your jobs...</div></div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">Confirm</div>
    <div class="modal-text" id="modal-text">Are you sure?</div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" id="modal-confirm" onclick="confirmAction()">Confirm</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://bfnwuurnzvncfumsnnds.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_8aFV9Gj8xlDChJuXuENLHA_stiqieCr';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentTech = null;
let pendingAction = null;

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  // Load techs into selector
  const { data: techs } = await db.from('technicians').select('*').order('name');
  const sel = document.getElementById('tech-select');
  (techs||[]).forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = t.name;
    sel.appendChild(opt);
  });

  // Check if logged in
  const saved = localStorage.getItem('cp_tech');
  if (saved) {
    const tech = (techs||[]).find(t => t.id === saved);
    if (tech) { currentTech = tech; showApp(); return; }
  }
}

function login() {
  const sel = document.getElementById('tech-select');
  if (!sel.value) { showToast('Please select your name', 'error'); return; }
  const techId = sel.value;
  localStorage.setItem('cp_tech', techId);
  // Get tech from options
  const opt = sel.options[sel.selectedIndex];
  currentTech = { id: techId, name: opt.textContent };
  showApp();
}

function logout() {
  localStorage.removeItem('cp_tech');
  currentTech = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-screen').classList.remove('visible');
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').classList.add('visible');
  document.getElementById('header-name').textContent = currentTech.name;
  document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  loadJobs();
}

// ── LOAD JOBS ─────────────────────────────────────────────────────────────────
async function loadJobs() {
  const { data: jobs } = await db
    .from('jobs')
    .select('*, customers(name, phone, address)')
    .eq('technician_id', currentTech.id)
    .not('status', 'in', '("complete","cancelled")')
    .order('scheduled_at', { ascending: true });

  const { data: done } = await db
    .from('jobs')
    .select('*, customers(name, phone)')
    .eq('technician_id', currentTech.id)
    .eq('status', 'complete')
    .gte('updated_at', new Date(new Date().setHours(0,0,0,0)).toISOString())
    .order('updated_at', { ascending: false });

  const container = document.getElementById('jobs-container');
  const badge = document.getElementById('jobs-badge');
  const activeJobs = jobs || [];
  const doneJobs = done || [];

  badge.textContent = `${activeJobs.length} job${activeJobs.length !== 1 ? 's' : ''}`;

  if (!activeJobs.length && !doneJobs.length) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-icon">✅</div>
      <div class="empty-title">All Clear</div>
      <div class="empty-text">You have no jobs assigned today.<br>Check back later or contact dispatch.</div>
    </div>`;
    return;
  }

  let html = '';

  if (activeJobs.length) {
    html += `<div class="section-label">Your Jobs Today</div>`;
    html += activeJobs.map(j => jobCardHTML(j)).join('');
  }

  if (doneJobs.length) {
    html += `<div class="section-label" style="margin-top:20px">Completed Today</div>`;
    html += doneJobs.map(j => jobCardHTML(j, true)).join('');
  }

  container.innerHTML = html;
}

function jobCardHTML(job, isDone = false) {
  const customer = job.customers;
  const time = job.scheduled_at ? new Date(job.scheduled_at).toLocaleString('en-US',{hour:'numeric',minute:'2-digit',weekday:'short',month:'short',day:'numeric'}) : 'Time TBD';
  const statusClass = `sb-${job.status}`;
  const statusLabel = { scheduled:'Scheduled', dispatched:'Dispatched', en_route:'En Route 🚗', on_site:'On Site 🔧', complete:'Complete ✓' }[job.status] || job.status;
  const address = job.address || customer?.address || '';
  const mapsUrl = `https://maps.google.com/?q=${encodeURIComponent(address)}`;

  const enrouteActive = job.status === 'en_route' ? 'active' : '';
  const onsiteActive = job.status === 'on_site' ? 'active' : '';
  const completeActive = job.status === 'complete' ? 'active' : '';

  return `<div class="job-card" id="job-${job.id}">
    <div class="job-card-header">
      <div class="job-card-top">
        <div class="job-customer">${customer?.name || 'Unknown'}</div>
        <span class="status-badge ${statusClass}">${statusLabel}</span>
      </div>
      <div class="job-service">${job.service_type || '—'}</div>
      <div class="job-address">📍 ${address || 'No address'}</div>
      <div class="job-time-row">
        <div class="job-time">🕐 ${time}</div>
        ${job.urgency === 'urgent' || job.urgency === 'emergency' ? '<span style="font-size:11px;background:#fdf0ee;color:#C0392B;padding:2px 8px;border-radius:10px;font-weight:700">URGENT</span>' : ''}
      </div>
      ${job.notes ? `<div class="job-notes">📝 ${job.notes}</div>` : ''}
    </div>
    ${!isDone ? `<div class="job-actions">
      <div class="action-label">Update Status</div>
      <div class="status-flow">
        <button class="action-btn btn-enroute ${enrouteActive}" onclick="updateStatus('${job.id}', 'en_route', '${customer?.name}', '${customer?.phone||''}')">🚗 On My Way</button>
        <button class="action-btn btn-onsite ${onsiteActive}" onclick="updateStatus('${job.id}', 'on_site', '${customer?.name}', '${customer?.phone||''}')">🔧 On Site</button>
        <button class="action-btn btn-complete ${completeActive}" onclick="confirmComplete('${job.id}', '${customer?.name}', '${customer?.phone||''}')">✓ Job Done</button>
      </div>
      ${address ? `<button class="btn-map" onclick="window.open('${mapsUrl}','_blank')">🗺 Open in Maps</button>` : ''}
      <button class="btn-estimate" onclick="openEstimateBuilder('${job.id}', '${(customer?.name||'').replace(/'/g,'')}', '${customer?.id||''}', '${customer?.phone||''}')">📄 Create / View Estimate</button>
    </div>` : ''}
  </div>`;
}

// ── STATUS UPDATE ─────────────────────────────────────────────────────────────
async function updateStatus(jobId, newStatus, customerName, customerPhone) {
  const labels = { en_route: 'On My Way', on_site: 'On Site', complete: 'Job Done' };

  // Update in DB
  const { error } = await db.from('jobs').update({ status: newStatus }).eq('id', jobId);
  if (error) { showToast('Error updating status', 'error'); return; }

  // Send SMS via Railway server
  if (newStatus === 'en_route' && customerPhone) {
    await sendSMS(customerPhone, customerName, newStatus, jobId);
  }

  showToast(`✓ Status updated: ${labels[newStatus]}`, 'success');
  setTimeout(loadJobs, 500);
}

async function sendSMS(phone, customerName, status, jobId) {
  try {
    const messages = {
      en_route: `Hi ${customerName}! Your Charlie's Plumbing tech ${currentTech.name} is on the way. They should arrive within 30 minutes. Questions? Call (801) 406-8585.`,
      complete: `Hi ${customerName}, your Charlie's Plumbing service is complete. Thank you for choosing us! We'd love a review: https://g.page/r/charlies-plumbing/review`,
    };
    const body = messages[status];
    if (!body) return;

    await fetch('https://charlies-plumbing-voice-production.up.railway.app/send-sms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ to: phone, body }),
    });
  } catch(e) {
    console.log('SMS send attempted:', e.message);
  }
}

// ── COMPLETE CONFIRM → PAYMENT SHEET ─────────────────────────────────────────
let pendingComplete = null;

async function confirmComplete(jobId, customerName, customerPhone) {
  pendingComplete = { jobId, customerName, customerPhone };
  // Load job to get estimate total
  const { data: job } = await db.from('jobs')
    .select('*,estimates(total,line_items,title)')
    .eq('id', jobId).single();
  const total = job?.estimates?.total || job?.invoice_amount || null;
  openPaymentSheet(jobId, customerName, customerPhone, total, job?.estimates);
}

function openPaymentSheet(jobId, customerName, customerPhone, total, estimate) {
  const sheet = document.getElementById('payment-sheet');
  const body = document.getElementById('payment-body');
  const totalStr = total ? '$' + parseFloat(total).toFixed(2) : null;

  body.innerHTML = `
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:36px;margin-bottom:8px">💰</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:#1A3A5C;letter-spacing:1.5px">Collect Payment</div>
      <div style="font-size:14px;color:#7F8C8D;margin-top:4px">${customerName}</div>
    </div>

    ${totalStr ? `
    <div style="background:#F0F7FF;border-radius:12px;padding:16px;text-align:center;margin-bottom:20px;border:1px solid #C8E0F4">
      <div style="font-size:11px;color:#2471A3;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">${estimate?.title || 'Invoice Total'}</div>

    </div>

    <div id="card-info" style="display:none;background:#FEF9E7;border-radius:10px;padding:14px;margin-bottom:16px;border:1px solid #F0E0A0">
      <div style="font-size:13px;color:#B7770D;line-height:1.6"><strong>Card payment link</strong> will be texted to ${customerPhone || 'the customer'} after you complete the job. The job will stay open until payment is received.</div>

  sheet.classList.add('open');
}

let selectedPayMethod = null;

function selectPayMethod(method, btn) {
  selectedPayMethod = method;
  document.querySelectorAll('.pay-method-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('check-field').style.display = method === 'check' ? 'block' : 'none';
  document.getElementById('card-info').style.display = method === 'card' ? 'block' : 'none';
  document.getElementById('pay-confirm-btn').disabled = false;
}

async function confirmPayment() {
  if (!selectedPayMethod) { showToast('Select a payment method'); return; }
  if (!pendingComplete) return;
  const { jobId, customerName, customerPhone } = pendingComplete;

  const btn = document.getElementById('pay-confirm-btn');
  btn.textContent = 'Processing...'; btn.disabled = true;

  // Get amount
  const amountEl = document.getElementById('pay-amount');
  const amount = amountEl ? parseFloat(amountEl.value) || null : null;
  const checkNum = document.getElementById('check-num')?.value || '';

  const payNote = selectedPayMethod === 'cash' ? 'Payment: Cash' :
                  selectedPayMethod === 'check' ? 'Payment: Check' + (checkNum ? ' #' + checkNum : '') :
                  'Payment: Card link sent';

  const isPaid = selectedPayMethod !== 'card';

  // Update job
  const updateData = {
    status: 'complete',
    invoice_paid: isPaid,
    notes: payNote
  };
  if (amount) updateData.invoice_amount = amount;

  await db.from('jobs').update(updateData).eq('id', jobId);

  // Send SMS
  if (customerPhone) {
    if (isPaid) {
      // Review request
      await fetch('https://charlies-plumbing-voice-production.up.railway.app/send-sms', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          to: customerPhone,
          body: `Hi ${customerName.split(' ')[0]}! Thanks for choosing Charlie's Plumbing. We hope everything is working perfectly. If you have a moment, we'd love a Google review: https://g.page/r/charlies-plumbing/review — Thank you! 🔧`
        })
      }).catch(() => {});
    } else {
      // Card payment link — send invoice link (placeholder until Stripe is set up)
      await fetch('https://charlies-plumbing-voice-production.up.railway.app/send-sms', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          to: customerPhone,
          body: `Hi ${customerName.split(' ')[0]}! Thank you for choosing Charlie's Plumbing. Your technician has completed the job. Please call (801) 406-8585 to complete your card payment. Thank you!`
        })
      }).catch(() => {});
    }
  }

  closePaymentSheet();
  pendingComplete = null;
  selectedPayMethod = null;
  showToast(isPaid ? '✓ Payment collected — job complete!' : '✓ Job complete — card link sent', 'success');
  setTimeout(loadJobs, 1000);
}

function closePaymentSheet() {
  document.getElementById('payment-sheet').classList.remove('open');
  document.getElementById('pay-confirm-btn').disabled = true;
  selectedPayMethod = null;
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── REAL-TIME ────────────────────────────────────────────────────────────────
db.channel('tech-jobs')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'jobs' }, () => {
    if (currentTech) loadJobs();
  }).subscribe();

// ── START ────────────────────────────────────────────────────────────────────
init();

<script>
// ═══════════════════════════════════════════════════════
//  ESTIMATE BUILDER — TECH VIEW
// ═══════════════════════════════════════════════════════
const SB_URL = 'https://bfnwuurnzvncfumsnnds.supabase.co';
const SB_KEY = 'sb_publishable_8aFV9Gj8xlDChJuXuENLHA_stiqieCr';
const SITE_URL = 'https://hustlemarketingco-oss.github.io/charlies-plumbing-dashboard';

let estJobId = null, estCustomerId = null, estCustomerName = '', estCustomerPhone = '';
let estLineItems = [{desc:'', qty:1, price:0}];
let currentEstId = null;
let taxRate = 0;

async function openEstimateBuilder(jobId, customerName, customerId, customerPhone) {
  estCustomerPhone = customerPhone || '';
  estJobId = jobId;
  estCustomerName = customerName;
  estCustomerId = customerId;
  currentEstId = null;
  estLineItems = [{desc:'', qty:1, price:0}];

  // Check if estimate already exists for this job
  const { data: existing } = await db.from('jobs')
    .select('estimate_id,estimates(*)')
    .eq('id', jobId).single();
  const existingEst = existing?.estimates || null;

  if (existingEst) {
    currentEstId = existingEst.id;
    estLineItems = existingEst.line_items || [{desc:'', qty:1, price:0}];
    taxRate = existingEst.tax_rate || 0;
    document.getElementById('est-sheet-title').textContent = 'Edit Estimate';
    document.getElementById('est-save-btn').textContent = 'Update Estimate';
    document.getElementById('est-send-btn').style.display = 'flex';
    document.getElementById('est-show-btn').style.display = 'flex';
    renderEstSheet(existingEst.title || '', existingEst.notes || '', existingEst.valid_until || '');
  } else {
    taxRate = 0;
    document.getElementById('est-sheet-title').textContent = 'Create Estimate';
    document.getElementById('est-save-btn').textContent = 'Save Estimate';
    document.getElementById('est-send-btn').style.display = 'none';
    document.getElementById('est-show-btn').style.display = 'none';
    renderEstSheet('', '', '');
  }

  document.getElementById('est-sheet').classList.add('open');
}

function renderEstSheet(title, notes, validUntil) {
  const body = document.getElementById('est-sheet-body');
  body.innerHTML = `
    <div class="est-field"><label class="est-label">Job / Service Title *</label><input class="est-input" id="est-title" value="${title}" placeholder="e.g. Water heater replacement"></div>
    <div class="est-field"><label class="est-label">Notes (optional)</label><textarea class="est-input" id="est-notes" rows="2" placeholder="Scope of work, parts, warranty info...">${notes}</textarea></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      <div class="est-field" style="margin:0"><label class="est-label">Tax Rate (%)</label><input class="est-input" id="est-tax" type="number" value="${taxRate}" min="0" max="30" step="0.1" oninput="taxRate=parseFloat(this.value)||0;estRecalc()"></div>
      <div class="est-field" style="margin:0"><label class="est-label">Valid Until</label><input class="est-input" id="est-valid" type="date" value="${validUntil}"></div>
    </div>
    <div class="est-field">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <label class="est-label" style="margin:0">Line Items</label>
        <button onclick="estAddItem()" style="background:none;border:1.5px solid #1A3A5C;color:#1A3A5C;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer">+ Add</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 50px 80px 30px;gap:6px;margin-bottom:6px">
        <span style="font-size:10px;color:#999;font-weight:700;text-transform:uppercase;letter-spacing:0.5px">Description</span>
        <span style="font-size:10px;color:#999;font-weight:700;text-transform:uppercase;letter-spacing:0.5px">Qty</span>
        <span style="font-size:10px;color:#999;font-weight:700;text-transform:uppercase;letter-spacing:0.5px">Price</span>
        <span></span>
      </div>
      <div id="est-line-items"></div>
    </div>
    <div class="est-totals" id="est-totals"></div>
  `;
  estRenderItems();
}

function estRenderItems() {
  const container = document.getElementById('est-line-items');
  if (!container) return;
  container.innerHTML = estLineItems.map((item, i) => `
    <div class="li-row">
      <input type="text" value="${item.desc||''}" placeholder="Description" onchange="estLineItems[${i}].desc=this.value">
      <input type="number" value="${item.qty||1}" min="0.5" step="0.5" oninput="estLineItems[${i}].qty=parseFloat(this.value)||1;estRecalc()">
      <input type="number" value="${item.price||''}" min="0" step="0.01" placeholder="0.00" oninput="estLineItems[${i}].price=parseFloat(this.value)||0;estRecalc()">
      <button class="li-del" onclick="estRemoveItem(${i})">✕</button>
    </div>`).join('');
  estRecalc();
}

function estAddItem() {
  estLineItems.push({desc:'', qty:1, price:0});
  estRenderItems();
  // Focus new row
  const inputs = document.querySelectorAll('.li-row input[type=text]');
  if (inputs.length) inputs[inputs.length-1].focus();
}

function estRemoveItem(i) {
  estLineItems.splice(i, 1);
  if (!estLineItems.length) estLineItems = [{desc:'', qty:1, price:0}];
  estRenderItems();
}

function estRecalc() {
  const subtotal = estLineItems.reduce((s, item) => s + (item.qty||1)*(item.price||0), 0);
  const tax = subtotal * (taxRate/100);
  const total = subtotal + tax;
  const el = document.getElementById('est-totals');
  if (!el) return;
  el.innerHTML = `
    <div class="est-total-row"><span>Subtotal</span><span>$${subtotal.toFixed(2)}</span></div>
    ${taxRate > 0 ? `<div class="est-total-row"><span>Tax (${taxRate}%)</span><span>$${tax.toFixed(2)}</span></div>` : ''}
    <div class="est-total-row grand"><span>TOTAL</span><span>$${total.toFixed(2)}</span></div>`;
  return { subtotal, tax, total };
}

async function saveEstimate() {
  const title = document.getElementById('est-title')?.value?.trim();
  if (!title) { alert('Please enter a title.'); return; }
  const totals = estRecalc();
  const btn = document.getElementById('est-save-btn');
  btn.textContent = 'Saving...'; btn.disabled = true;

  const payload = {
    customer_id: estCustomerId || null,
    title,
    notes: document.getElementById('est-notes')?.value || '',
    valid_until: document.getElementById('est-valid')?.value || null,
    tax_rate: taxRate,
    line_items: estLineItems.map(i => ({desc:i.desc, qty:i.qty, unit_price:i.price})),
    subtotal: totals.subtotal,
    tax_amount: totals.tax,
    total: totals.total,
    status: currentEstId ? undefined : 'draft'
  };

  let error;
  if (currentEstId) {
    delete payload.status;
    ({ error } = await db.from('estimates').update(payload).eq('id', currentEstId));
  } else {
    const { data, error: e } = await db.from('estimates').insert({...payload, status:'draft'}).select().single();
    error = e;
    if (data) {
      currentEstId = data.id;
      // Link estimate to job
      await db.from('jobs').update({ estimate_id: data.id }).eq('id', estJobId);
    }
  }

  btn.textContent = currentEstId ? 'Update Estimate' : 'Save Estimate';
  btn.disabled = false;

  if (!error) {
    showToast('✓ Estimate saved', 'success');
    document.getElementById('est-send-btn').style.display = 'flex';
    document.getElementById('est-show-btn').style.display = 'flex';
  } else {
    showToast('⚠ Error saving');
    console.error(error);
  }
}

async function sendEstimateToCustomer() {
  if (!currentEstId) { alert('Save the estimate first.'); return; }
  if (!estCustomerPhone) { alert('No phone number on file for this customer.'); return; }
  const estUrl = 'https://hustlemarketingco-oss.github.io/charlies-plumbing-dashboard/estimate.html?id=' + currentEstId;
  await fetch('https://charlies-plumbing-voice-production.up.railway.app/send-sms', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      to: estCustomerPhone,
      body: `Hi ${estCustomerName.split(' ')[0] || 'there'}! Charlie's Plumbing sent you an estimate. Review and approve here: ${estUrl} — Questions? Call (801) 406-8585.`
    })
  }).catch(() => {});
  await db.from('estimates').update({status:'sent'}).eq('id', currentEstId);
  showToast('✓ Estimate sent via SMS', 'success');
}

async function showEstimateToCustomer() {
  if (!currentEstId) { alert('Save the estimate first.'); return; }

  html += `</div>`;

  view.innerHTML = html;
  view.style.display = 'block';
  view.scrollTop = 0;
}

async function customerApproveInline(estId, phone, name) {
  const btn = event.target;
  btn.textContent = 'Approving...'; btn.disabled = true;
  await db.from('estimates').update({status:'approved'}).eq('id', estId);
  // Auto-create job from estimate
  const { data: est } = await db.from('estimates').select('*').eq('id', estId).single();
  if (est) {
    await db.from('jobs').update({
      status: 'scheduled',
      invoice_amount: est.total || null
    }).eq('estimate_id', estId);
  }
  if (phone) {
    fetch('https://charlies-plumbing-voice-production.up.railway.app/send-sms', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ to: phone, body: `Hi ${name.split(' ')[0]}! You've approved the estimate. Charlie's Plumbing will proceed with the work. Questions? Call (801) 406-8585.` })
    }).catch(() => {});
  }
  btn.textContent = '✓ Approved!';
  // Refresh the view to show approved state
  const { data: updatedEst } = await db.from('estimates').select('*,customers(name,phone)').eq('id', estId).single();
  if (updatedEst) renderCustomerApprovalView(updatedEst);
}

function closeCustomerView() {
  document.getElementById('customer-approval-view').style.display = 'none';
  // Reopen estimate editor
  openEstimateBuilder(estJobId, estCustomerName, estCustomerId, estCustomerPhone);
}

function closeEstSheet() {
  document.getElementById('est-sheet').classList.remove('open');
}
</script>
